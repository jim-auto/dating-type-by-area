<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エリア別 恋愛行動タイプ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>エリア別 恋愛行動タイプ</h1>
    <span class="badge">日本</span>
  </header>
  <div class="container">
    <div id="map"></div>
    <div class="panel" id="panel">
      <div id="panel-empty" class="panel-empty">
        <div class="icon">&#x1F5FA;</div>
        <p>地図上のエリアをクリックして<br>恋愛行動タイプを確認</p>
      </div>
      <div id="panel-content" class="panel-content">
        <div class="area-header">
          <h2 id="area-name"></h2>
          <span class="city" id="area-city"></span>
          <div>
            <span id="dating-type" class="dating-type-badge"></span>
          </div>
        </div>
        <div class="section">
          <div class="section-title">街の特徴</div>
          <div class="traits-list" id="traits"></div>
        </div>
        <div class="section">
          <div class="section-title">住民タイプ</div>
          <ul class="residents-list" id="residents"></ul>
        </div>
        <div class="section">
          <div class="section-title">判定チェックリスト</div>
          <div id="checklist"></div>
        </div>
        <div class="section">
          <div class="section-title">なぜこのタイプか</div>
          <p class="description" id="description"></p>
        </div>
        <div class="legend">
          <h3>凡例</h3>
          <div class="legend-item">
            <span class="legend-dot fast"></span>
            即系 — 関係の進展が早い
          </div>
          <div class="legend-item">
            <span class="legend-dot slow"></span>
            非即系 — 関係の進展がゆっくり
          </div>
          <div class="legend-item">
            <span class="legend-dot mixed"></span>
            中間 — 即系・非即系の要素が拮抗
          </div>
        </div>
      </div>
    </div>
  </div>
  <section class="table-section">
    <h2 class="table-heading">エリア一覧</h2>
    <div class="table-filters">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="tokyo">東京</button>
      <button class="filter-btn" data-filter="osaka">大阪</button>
      <button class="filter-btn" data-filter="nagoya">名古屋</button>
    </div>
    <div class="table-wrapper">
      <table id="area-table">
        <thead>
          <tr>
            <th>エリア</th>
            <th>都市</th>
            <th>タイプ</th>
            <th>即/非即</th>
            <th>街の特徴</th>
            <th>住民タイプ</th>
            <th>説明</th>
          </tr>
        </thead>
        <tbody id="area-table-body"></tbody>
      </table>
    </div>
  </section>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
